    <div class="screen" id="screenSearch">
      <!-- Üst: gerçek arama input'u -->
      <div style="padding:6px var(--app-px) 8px">
        <div id="srchInputBar" style="padding:10px 14px;display:flex;align-items:center;gap:10px;background:var(--bg-page);border:1px solid var(--border-subtle);border-radius:var(--r-full);box-shadow:var(--shadow-md)">
          <iconify-icon icon="solar:magnifer-linear" style="font-size:18px;color:var(--text-muted);flex-shrink:0"></iconify-icon>
          <input id="srchInput" type="text" placeholder="Yemek, malzeme veya restoran ara..." autocomplete="off"
            style="flex:1;border:none;outline:none;background:transparent;font:var(--fw-medium) var(--fs-md)/1 var(--font);color:var(--text-primary);min-width:0">
          <iconify-icon id="srchClearIco" icon="solar:close-circle-bold" onclick="srchClearQuery()"
            style="font-size:18px;color:var(--text-muted);flex-shrink:0;cursor:pointer;display:none"></iconify-icon>
        </div>
      </div>

      <!-- Boş durum (query yokken gösterilir) -->
      <div id="srchIdleWrap">
        <!-- Arama Geçmişi -->
        <div id="srchHistorySec"></div>

        <!-- Trend Aramalar -->
        <div id="srchTrendSec" style="padding:14px var(--app-px) 6px">
          <div style="font:var(--fw-bold) var(--fs-md)/1 var(--font);color:var(--text-primary);margin-bottom:10px">Kullanıcıların En Çok Aradıkları</div>
          <div id="srchTrendList" style="display:flex;flex-wrap:wrap;gap:8px"></div>
        </div>

        <!-- Hızlı Filtreler -->
        <div style="padding:14px var(--app-px) 6px">
          <div style="font:var(--fw-bold) var(--fs-md)/1 var(--font);color:var(--text-primary);margin-bottom:10px">Hızlı Filtreler</div>
          <div id="srchQuickFilters" style="display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px"></div>
        </div>

        <!-- Malzeme ile Ara tile'ı -->
        <div style="padding:14px var(--app-px) 4px">
          <div id="srchIngTile" onclick="srchOpenIngredientSheet()"
            style="position:relative;padding:18px 18px 18px 16px;border-radius:var(--r-xl);cursor:pointer;overflow:hidden;background:linear-gradient(135deg,#FFE4D6 0%,#FFCBB3 50%,#FFB088 100%);box-shadow:0 6px 18px rgba(239,83,41,.12);display:flex;align-items:center;gap:14px">
            <div style="width:52px;height:52px;border-radius:var(--r-lg);background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(239,83,41,.12)">
              <iconify-icon icon="solar:carrot-bold" style="font-size:30px;color:#EA580C"></iconify-icon>
            </div>
            <div style="flex:1;min-width:0">
              <div style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--r-full);background:rgba(255,255,255,.7);margin-bottom:4px">
                <iconify-icon icon="solar:star-bold" style="font-size:10px;color:#EA580C"></iconify-icon>
                <span style="font:var(--fw-bold) 9.5px/1 var(--font);color:#9A3412;letter-spacing:.3px">AKILLI ÖNERİ</span>
              </div>
              <div style="font:var(--fw-bold) var(--fs-md)/1.2 var(--font);color:#7C2D12">Malzeme ile Ara</div>
              <div style="font:var(--fw-regular) 11.5px/1.3 var(--font);color:#9A3412;margin-top:3px">Buzdolabında ne varsa seç, sana yemek önerelim</div>
            </div>
            <iconify-icon icon="solar:alt-arrow-right-bold" style="font-size:22px;color:#9A3412;flex-shrink:0"></iconify-icon>
          </div>
        </div>

        <!-- Keşfet Grid (mevcut) -->
        <div style="padding:16px var(--app-px) 4px;font:var(--fw-bold) var(--fs-md)/1 var(--font);color:var(--text-primary)">Keşfet</div>
        <div style="padding:10px var(--app-px) var(--app-px);display:flex;gap:10px" id="kesfetGrid">
          <div style="flex:1;display:flex;flex-direction:column;gap:10px" id="kesfetCol0"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:10px" id="kesfetCol1"></div>
        </div>
      </div>

      <!-- Sonuç alanı (query veya malzeme aramasıyla gösterilir) -->
      <div id="srchResults" style="display:none;padding:8px var(--app-px) var(--app-px)"></div>
    </div>
