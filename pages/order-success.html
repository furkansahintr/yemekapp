<!-- ═══ ORDER SUCCESS OVERLAY ═══ -->
<div class="order-success-overlay" id="orderSuccessOverlay">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:0 32px;text-align:center">
    <div style="width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:20px">
      <iconify-icon icon="solar:check-circle-bold" style="font-size:48px;color:var(--primary)"></iconify-icon>
    </div>
    <div style="font:var(--fw-bold) var(--fs-2xl)/1.2 var(--font);color:var(--text-primary)">Siparişin Alındı!</div>
    <div style="font:var(--fw-regular) var(--fs-md)/1.5 var(--font);color:var(--text-muted);margin-top:10px">Siparişin hazırlanıyor. Tahmini teslimat süresi <strong style="color:var(--text-primary)">25-35 dk</strong></div>
    <div id="orderSuccessAddr" style="font:var(--fw-medium) var(--fs-sm)/1.4 var(--font);color:var(--text-secondary);margin-top:16px;padding:12px 20px;background:var(--bg-phone);border:1px solid var(--border-subtle);box-shadow:var(--shadow-sm);border-radius:var(--r-lg)"></div>
    <button class="btn-primary" style="margin-top:28px;padding:14px 40px" onclick="closeOrderSuccess()">Ana Sayfaya Dön</button>
  </div>
</div>
