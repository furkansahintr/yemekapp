    <!-- ═══ SETTINGS PANEL ═══ -->
    <div class="settings-overlay" id="settingsOverlay">
      <div class="settings-panel">
        <div class="notif-header">
          <div class="btn-icon" onclick="closeSettingsPanel()"><iconify-icon icon="solar:arrow-left-outline" style="font-size:20px"></iconify-icon></div>
          <span style="font:var(--fw-semibold) var(--fs-lg)/1 var(--font);color:var(--text-primary);flex:1">Ayarlar</span>
          <div style="width:36px"></div>
        </div>
        <div class="settings-body">
          <!-- Task 8.3: Settings Menu -->
          <div class="settings-section-label">Hesap</div>
          <div class="settings-item" onclick="openProfileEdit()">
            <div class="settings-item-icon"><iconify-icon icon="solar:user-circle-bold" style="font-size:20px;color:var(--primary)"></iconify-icon></div>
            <div class="settings-item-info"><div class="settings-item-title">Profili Düzenle</div><div class="settings-item-desc">Ad, bio, fotoğraf</div></div>
            <iconify-icon icon="solar:alt-arrow-right-linear" style="font-size:16px;color:var(--text-tertiary)"></iconify-icon>
          </div>
          <div class="settings-item" onclick="openNotifications()">
            <div class="settings-item-icon"><iconify-icon icon="solar:bell-bold" style="font-size:20px;color:#EF4444"></iconify-icon></div>
            <div class="settings-item-info"><div class="settings-item-title">Bildirimler</div><div class="settings-item-desc">Anlık bildirim tercihleri</div></div>
            <iconify-icon icon="solar:alt-arrow-right-linear" style="font-size:16px;color:var(--text-tertiary)"></iconify-icon>
          </div>
          <div class="settings-item" onclick="closeSettingsPanel();openDeleteAccountPage()">
            <div class="settings-item-icon"><iconify-icon icon="solar:heart-angle-bold" style="font-size:20px;color:#EC4899"></iconify-icon></div>
            <div class="settings-item-info"><div class="settings-item-title" style="color:#EC4899">Hesabımı Sil</div><div class="settings-item-desc">Gitmeden önce son bir söz...</div></div>
            <iconify-icon icon="solar:alt-arrow-right-linear" style="font-size:16px;color:var(--text-tertiary)"></iconify-icon>
          </div>

          <div class="settings-section-label">Diğer</div>
          <div class="settings-item" onclick="toggleTheme()">
            <div class="settings-item-icon"><iconify-icon icon="solar:moon-bold" style="font-size:20px;color:var(--text-secondary)"></iconify-icon></div>
            <div class="settings-item-info"><div class="settings-item-title" id="settingsThemeLabel">Karanlık Mod</div></div>
            <div style="width:36px;height:20px;border-radius:10px;background:var(--glass-card-strong);position:relative;transition:background .2s" id="settingsThemeSwitch">
              <div style="width:16px;height:16px;border-radius:50%;background:var(--text-muted);position:absolute;top:2px;left:2px;transition:all .2s" id="settingsThemeSwitchDot"></div>
            </div>
          </div>

          <div style="padding:20px 0 8px;text-align:center">
            <div style="font:var(--fw-regular) var(--fs-xs)/1.3 var(--font);color:var(--text-tertiary);margin-bottom:12px">Versiyon 1.0.0</div>
            <div style="padding:12px 16px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer" onclick="AUTH.logout()">
              <iconify-icon icon="solar:logout-2-bold" style="font-size:20px;color:#EF4444"></iconify-icon>
              <div style="font:var(--fw-medium) var(--fs-md)/1 var(--font);color:#EF4444">Çıkış Yap</div>
            </div>
          </div>
        </div>
      </div>
    </div>
